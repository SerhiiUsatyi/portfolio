<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Опис сторінки">
    <meta name="author" content="Твоє ім'я">
    <title>Назва сторінки - Портфоліо</title>
</head>
<body>
<header>
    <h1>Serhii Usatyi</h1>
    <nav>
        <ul>
            <li><a href="index.html">Головна</a></li>
            <li><a href="about.html">Про мене</a></li>
            <li><a href="contacts.html">Контакти</a></li>
        </ul>
    </nav>
</header>
<main>
    <h1>Контакти</h1>

    <p>Якщо хочете зв’язатися зі мною, скористайтеся контактами або формою нижче.</p>

    <p>Email: <a href="mailto:example@gmail.com">example@gmail.com</a></p>
    <p>Телефон: <a href="tel:+380123456789">+380123456789</a></p>

    <form action="#" method="post">
        <fieldset>
            <legend>Контактна інформація</legend>

            <label for="name">Ім’я:</label>
            <input type="text" id="name" name="name" placeholder="Ваше ім’я" required>

            <br><br>

            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="email@example.com" required>
        </fieldset>
        <br>
        <fieldset>
            <legend>Повідомлення</legend>

            <label for="subject">Тема:</label>
            <select id="subject" name="subject" required>
                <option value="">-- Оберіть тему --</option>
                <option value="general">Загальне питання</option>
                <option value="cooperation">Співпраця</option>
                <option value="feedback">Відгук</option>
            </select>
            <br><br>
            <p>Тип звернення:</p>

            <label>
                <input type="radio" name="type" value="question" required>
                Питання
            </label>

            <label>
                <input type="radio" name="type" value="suggestion">
                Пропозиція
            </label>

            <label>
                <input type="radio" name="type" value="complaint">
                Скарга
            </label>

            <br><br>

            <label for="message">Повідомлення:</label>
            <textarea id="message" name="message" rows="5" placeholder="Ваш текст..." required></textarea>
        </fieldset>

        <br>

        <label>
            <input type="checkbox" name="consent" required>
            Я погоджуюсь на обробку персональних даних
        </label>

        <br><br>

        <button type="submit">Надіслати</button>
    </form>
</main>
</body>
</html>
